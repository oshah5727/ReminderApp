<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Studious - Welcome</title>

    <link rel="stylesheet" href="/resources/css/styles.css">
</head>
<body>
    <h1>Welcome to Studious</h1>
    <p>Your unified calendar hub.</p>
    <a href="/login">Go to Login</a>
<h2>Upcoming Events</h2>

<ul>
  <li th:each="event : ${events}"
      th:class="'priority-' + ${event.priority.toString().toLowerCase()}">

      <span th:text="${event.title}"></span>
      -
      <span th:text="${event.date}"></span>
      -
      <span th:text="${event.priority}"></span>

  </li>
</ul>    
</body>
</html>
