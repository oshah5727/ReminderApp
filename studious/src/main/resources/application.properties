spring.application.name=studious

# Google OAuth Configuration
# TEAM: PLEASE LOOK AT TEAMS FOR THE CID AND CSECRET. PLACE IT IN THE TWO CLIENT.ID'S BELOW AFTER THE COLON
google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}
google.redirect.uri=http://localhost:8080/auth/google/callback
google.scopes=openid,email,https://www.googleapis.com/auth/calendar.readonly,https://www.googleapis.com/auth/calendar.events

# H2 File-based Database (persists between restarts)
spring.datasource.url=jdbc:h2:file:./data/studious
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.open-in-view=false
