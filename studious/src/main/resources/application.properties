spring.application.name=studious

# Google OAuth Configuration
# TEAM: PLEASE LOOK AT TEAMS FOR THE CID AND CSECRET. PLACE IT IN THE TWO CLIENT.ID'S BELOW AFTER THE COLON
google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}
google.redirect.uri=http://localhost:8080/auth/google/callback
google.scopes=openid,email,https://www.googleapis.com/auth/calendar.readonly,https://www.googleapis.com/auth/calendar.events
